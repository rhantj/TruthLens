{% extends "base.html" %}
{% block title %}이미지 판별 - TruthLens{% endblock %}
{% block content %}
<h2>이미지 AI 생성 판별</h2>
<form action="{{ url_for('image.detect_image_api') }}" method="post" enctype="multipart/form-data">
    <p>
        <label>이미지 업로드 (JPG, JPEG, PNG, WebP, GIF / 최대 20MB, 최대 10장)</label><br>
        <input type="file" name="file" accept=".jpg,.jpeg,.png,.webp,.gif" multiple>
    </p>
    <button type="submit">분석하기</button>
</form>
{% endblock %}
