<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TruthLens{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <h1><a href="{{ url_for('main.index') }}">TruthLens</a></h1>
        <nav>
            <a href="{{ url_for('video.detect_video_page') }}">영상 판별</a>
            <a href="{{ url_for('image.detect_image_page') }}">이미지 판별</a>
            <a href="{{ url_for('news.detect_news_page') }}">뉴스 판별</a>
            <a href="{{ url_for('paper.detect_paper_page') }}">논문 판별</a>
            <a href="{{ url_for('main.history') }}">판별 이력</a>
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
