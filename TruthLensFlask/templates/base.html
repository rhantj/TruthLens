<!DOCTYPE html>
<html lang="ko" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TruthLens{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/index.css') }}">
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-container": "#edeeef",
              "on-primary-fixed": "#1a1b24",
              "on-secondary": "#ffffff",
              "inverse-on-surface": "#f0f1f2",
              "secondary-fixed-dim": "#89ceff",
              "primary-fixed-dim": "#c6c5d2",
              "secondary-container": "#39b8fd",
              "surface-container-highest": "#e1e3e4",
              "secondary": "#006591",
              "error": "#ba1a1a",
              "surface-dim": "#d9dadb",
              "surface-container-lowest": "#ffffff",
              "primary-container": "#1e1f28",
              "error-container": "#ffdad6",
              "tertiary-fixed": "#eee1cc",
              "on-secondary-fixed": "#001e2f",
              "outline-variant": "#c8c5cc",
              "on-tertiary-container": "#908674",
              "on-surface-variant": "#47464b",
              "on-secondary-fixed-variant": "#004c6e",
              "on-secondary-container": "#004666",
              "surface-container-low": "#f3f4f5",
              "deep-navy": "#1E1F28",
              "on-surface": "#191c1d",
              "inverse-primary": "#c6c5d2",
              "on-primary-fixed-variant": "#454650",
              "inverse-surface": "#2e3132",
              "on-error": "#ffffff",
              "surface": "#f8f9fa",
              "on-error-container": "#93000a",
              "tertiary-container": "#251f12",
              "secondary-fixed": "#c9e6ff",
              "alert-red": "#EF4444",
              "authentic-green": "#10B981",
              "on-primary": "#ffffff",
              "surface-variant": "#e1e3e4",
              "on-tertiary-fixed": "#211b0e",
              "tertiary": "#0b0701",
              "surface-bright": "#f8f9fa",
              "primary-fixed": "#e2e1ee",
              "on-background": "#191c1d",
              "surface-container-high": "#e7e8e9",
              "tertiary-fixed-dim": "#d1c5b1",
              "primary": "#06070f",
              "outline": "#77767c",
              "on-tertiary-fixed-variant": "#4e4637",
              "suspicious-yellow": "#F59E0B",
              "on-tertiary": "#ffffff",
              "background": "#f8f9fa",
              "electric-blue": "#0EA5E9",
              "surface-tint": "#5d5d68",
              "on-primary-container": "#868692"
            },
            borderRadius: {
              "DEFAULT": "0.125rem",
              "lg": "0.25rem",
              "xl": "0.5rem",
              "full": "0.75rem"
            },
            spacing: {
              "section-gap": "40px",
              "gutter": "16px",
              "base": "4px",
              "container-padding-mobile": "16px",
              "container-padding-desktop": "32px"
            },
            fontFamily: {
              "label-mono": ["JetBrains Mono"],
              "body-md": ["Inter"],
              "body-sm": ["Inter"],
              "title-md": ["Inter"],
              "headline-lg": ["Hanken Grotesk"],
              "display-lg": ["Hanken Grotesk"],
              "headline-lg-mobile": ["Hanken Grotesk"]
            },
            fontSize: {
              "label-mono": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
              "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
              "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
              "title-md": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
              "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
              "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
              "headline-lg-mobile": ["24px", {"lineHeight": "32px", "fontWeight": "600"}]
            }
          }
        }
      }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        .scanning-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #0EA5E9, transparent);
            box-shadow: 0 0 15px #0EA5E9;
            animation: scan 2s linear infinite;
            position: absolute;
            width: 100%;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-surface font-body-md text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl border-b border-outline-variant/30 flex justify-between items-center px-container-padding-mobile h-16">
    <div class="flex items-center gap-4">
        <span class="material-symbols-outlined text-primary">menu</span>
        <a href="{{ url_for('main.index') }}" class="font-headline-lg-mobile text-headline-lg-mobile font-bold tracking-tight text-deep-navy no-underline">TruthLens</a>
    </div>
    <div class="flex items-center gap-2">
        <a href="{{ url_for('main.history') }}" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high/50 transition-colors p-2 rounded-full no-underline">history</a>
        <a href="{{ url_for('main.login') }}" class="material-symbols-outlined text-on-surface-variant hover:bg-surface-container-high/50 transition-colors p-2 rounded-full no-underline">login</a>
    </div>
</header>

<!-- Main Content -->
<main class="flex-grow pt-20 pb-24 px-container-padding-mobile md:px-container-padding-desktop max-w-screen-xl mx-auto w-full">
{% block content %}{% endblock %}
</main>

<!-- Footer -->
<footer class="w-full py-8 bg-surface-container-low border-t border-outline-variant/20 flex flex-col items-center justify-center space-y-4 px-container-padding-mobile text-center mb-20">
    <span class="font-label-mono text-label-mono uppercase tracking-widest text-deep-navy">TruthLens AI</span>
    <p class="font-body-sm text-body-sm text-on-surface-variant">© 2026 TruthLens AI. 디지털 정직성을 보장합니다.</p>
    <div class="flex gap-4">
        <a class="text-on-surface-variant hover:text-primary transition-colors font-body-sm" href="#">이용약관</a>
        <a class="text-on-surface-variant hover:text-primary transition-colors font-body-sm" href="#">개인정보처리방침</a>
        <a class="text-on-surface-variant hover:text-primary transition-colors font-body-sm" href="#">포렌식 방법론</a>
    </div>
</footer>

<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-4 pt-2 bg-surface/80 backdrop-blur-xl border-t border-outline-variant/30 shadow-lg">
    <a href="{{ url_for('main.index') }}" class="flex flex-col items-center justify-center transition-all active:scale-90 duration-200 {% if active_page == 'home' %}bg-secondary-container/20 text-secondary rounded-full px-4 py-1{% else %}text-on-surface-variant hover:text-electric-blue{% endif %}">
        <span class="material-symbols-outlined"{% if active_page == 'home' %} style="font-variation-settings: 'FILL' 1;"{% endif %}>home</span>
        <span class="font-label-mono text-label-mono">홈</span>
    </a>
    <a href="{{ url_for('main.history') }}" class="flex flex-col items-center justify-center transition-all active:scale-90 duration-200 {% if active_page == 'history' %}bg-secondary-container/20 text-secondary rounded-full px-4 py-1{% else %}text-on-surface-variant hover:text-electric-blue{% endif %}">
        <span class="material-symbols-outlined"{% if active_page == 'history' %} style="font-variation-settings: 'FILL' 1;"{% endif %}>history</span>
        <span class="font-label-mono text-label-mono">기록</span>
    </a>
    <a href="{{ url_for('main.index') }}#detection-suite" class="flex flex-col items-center justify-center transition-all active:scale-90 duration-200 {% if active_page == 'detect' %}bg-secondary-container/20 text-secondary rounded-full px-4 py-1{% else %}text-on-surface-variant hover:text-electric-blue{% endif %}">
        <span class="material-symbols-outlined"{% if active_page == 'detect' %} style="font-variation-settings: 'FILL' 1;"{% endif %}>document_scanner</span>
        <span class="font-label-mono text-label-mono">탐지</span>
    </a>
    <a href="{{ url_for('mypage.profile') }}" class="flex flex-col items-center justify-center transition-all active:scale-90 duration-200 {% if active_page == 'settings' %}bg-secondary-container/20 text-secondary rounded-full px-4 py-1{% else %}text-on-surface-variant hover:text-electric-blue{% endif %}">
        <span class="material-symbols-outlined"{% if active_page == 'settings' %} style="font-variation-settings: 'FILL' 1;"{% endif %}>settings</span>
        <span class="font-label-mono text-label-mono">설정</span>
    </a>
</nav>


<script src="{{ url_for('static', filename='js/main.js') }}"></script>
{% block extra_script %}{% endblock %}
</body>
</html>
